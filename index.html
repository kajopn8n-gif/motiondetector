<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Exercise Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080a;
    --surface: #111114;
    --surface2: #1a1a1f;
    --border: #2a2a30;
    --text: #e8e8ec;
    --text-dim: #6e6e78;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.15);
    --red: #ff3b5c;
    --blue: #3b82f6;
    --orange: #ff8a00;
    --purple: #a855f7;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(200,255,0,0); }
  }
  .status-badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(200,255,0,0.2);
  }

  .app-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .camera-wrapper video,
  .camera-wrapper canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* NO mirror flip — natural view */

  .camera-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }
  .overlay-corner {
    position: absolute;
    width: 32px; height: 32px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
  }
  .overlay-corner.tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
  .overlay-corner.tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
  .overlay-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
  .overlay-corner.br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

  .rep-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 120px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(200,255,0,0.3);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .rep-display.show {
    opacity: 1;
    animation: rep-pop 0.4s ease;
  }
  @keyframes rep-pop {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .countdown-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    background: rgba(8,8,10,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .countdown-overlay.hidden { display: none; }
  .countdown-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 100px;
    font-weight: 700;
    color: var(--accent);
    animation: count-pulse 1s ease infinite;
  }
  .countdown-label {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    padding: 0 20px;
  }
  @keyframes count-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
  }

  .camera-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 4;
    background: var(--surface);
  }
  .camera-placeholder.hidden { display: none; }
  .camera-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .camera-placeholder p {
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
  }

  .loading-bar-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 4px;
    background: var(--surface2);
    z-index: 10;
  }
  .loading-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 0 2px 2px 0;
  }
  .loading-text {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    z-index: 10;
    background: rgba(8,8,10,0.8);
    padding: 4px 12px;
    border-radius: 8px;
  }

  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .exercise-btn {
    position: relative;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .exercise-btn:hover {
    border-color: var(--text-dim);
    background: var(--surface2);
  }
  .exercise-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .exercise-btn .ex-icon { font-size: 24px; line-height: 1; }
  .exercise-btn .ex-reps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
  }

  .phase-bar {
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .phase-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    min-width: 55px;
  }
  .phase-track {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .phase-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.15s, background 0.15s;
    width: 0%;
    background: var(--accent);
  }
  .phase-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    min-width: 50px;
    text-align: right;
    color: var(--text);
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }
  .stat-value.accent { color: var(--accent); }

  .controls {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--text-dim); }

  .feedback-bar {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 48px;
  }
  .feedback-bar .fb-icon { font-size: 18px; flex-shrink: 0; }
  .feedback-bar.good { color: var(--accent); border-color: rgba(200,255,0,0.2); }
  .feedback-bar.warn { color: var(--orange); border-color: rgba(255,138,0,0.2); }

  @media (max-width: 480px) {
    .camera-wrapper { aspect-ratio: 3/4; }
    .exercise-btn { padding: 10px 4px; font-size: 10px; }
    .exercise-btn .ex-icon { font-size: 20px; }
    .exercise-btn .ex-reps { font-size: 16px; }
    .rep-display { font-size: 80px; }
    .countdown-number { font-size: 72px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-dot"></div>MOTION·AI</div>
  <div class="status-badge" id="statusBadge">OCZEKIWANIE</div>
</div>

<div class="app-container">
  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="camera-overlay">
      <div class="overlay-corner tl"></div>
      <div class="overlay-corner tr"></div>
      <div class="overlay-corner bl"></div>
      <div class="overlay-corner br"></div>
    </div>
    <div class="rep-display" id="repDisplay">0</div>
    <div class="countdown-overlay hidden" id="countdownOverlay">
      <div class="countdown-number" id="countdownNumber">3</div>
      <div class="countdown-label" id="countdownLabel">Przygotuj pozycję startową...</div>
    </div>
    <div class="camera-placeholder" id="placeholder">
      <div class="camera-icon">📷</div>
      <p>Włącz kamerę, aby rozpocząć<br>detekcję ćwiczeń</p>
    </div>
    <div class="loading-bar-container" id="loadingContainer" style="display:none">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText" style="display:none">Ładowanie modelu AI...</div>
  </div>

  <div class="exercise-grid">
    <button class="exercise-btn active" data-exercise="pushups" onclick="selectExercise('pushups', this)">
      <span class="ex-icon">💪</span><span>Pompki</span>
      <span class="ex-reps" id="reps-pushups">0</span>
    </button>
    <button class="exercise-btn" data-exercise="squats" onclick="selectExercise('squats', this)">
      <span class="ex-icon">🦵</span><span>Przysiady</span>
      <span class="ex-reps" id="reps-squats">0</span>
    </button>
    <button class="exercise-btn" data-exercise="crunches" onclick="selectExercise('crunches', this)">
      <span class="ex-icon">🔥</span><span>Brzuszki</span>
      <span class="ex-reps" id="reps-crunches">0</span>
    </button>
    <button class="exercise-btn" data-exercise="jumpingjacks" onclick="selectExercise('jumpingjacks', this)">
      <span class="ex-icon">⭐</span><span>Pajacyki</span>
      <span class="ex-reps" id="reps-jumpingjacks">0</span>
    </button>
  </div>

  <div class="phase-bar">
    <div class="phase-label" id="phaseLabel">Faza</div>
    <div class="phase-track"><div class="phase-fill" id="phaseFill"></div></div>
    <div class="phase-value" id="phaseValue">–</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Powtórzenia</div>
      <div class="stat-value accent" id="totalReps">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Czas</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tempo /min</div>
      <div class="stat-value" id="pace">–</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="toggleCamera()">Rozpocznij</button>
    <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
  </div>

  <div class="feedback-bar" id="feedback">
    <span class="fb-icon">ℹ️</span>
    <span id="feedbackText">Wybierz ćwiczenie i włącz kamerę, aby zacząć trening.</span>
  </div>
</div>

<script>
// ==================== STATE ====================
let currentExercise = 'pushups';
let reps = { pushups: 0, squats: 0, crunches: 0, jumpingjacks: 0 };
let isRunning = false;
let isCounting = false;
let detector = null;
let video, canvas, ctx;
let timerInterval = null;
let startTime = null;
let animFrameId = null;

let exerciseState = 'idle';
let stateHoldFrames = 0;
const DEBOUNCE_FRAMES = 7;
let lastRepTime = 0;
const REP_COOLDOWN_MS = 500;
let consecutiveNullFrames = 0;

const SMOOTH_SIZE = 5;
let angleBuffers = {};

// ==================== KEYPOINTS ====================
const L_SHOULDER = 5, R_SHOULDER = 6;
const L_ELBOW = 7, R_ELBOW = 8;
const L_WRIST = 9, R_WRIST = 10;
const L_HIP = 11, R_HIP = 12;
const L_KNEE = 13, R_KNEE = 14;
const L_ANKLE = 15, R_ANKLE = 16;

const SKELETON = [
  [L_SHOULDER, R_SHOULDER],
  [L_SHOULDER, L_ELBOW], [L_ELBOW, L_WRIST],
  [R_SHOULDER, R_ELBOW], [R_ELBOW, R_WRIST],
  [L_SHOULDER, L_HIP], [R_SHOULDER, R_HIP],
  [L_HIP, R_HIP],
  [L_HIP, L_KNEE], [L_KNEE, L_ANKLE],
  [R_HIP, R_KNEE], [R_KNEE, R_ANKLE],
];

// ==================== UTILITY ====================
function angle(a, b, c) {
  const r = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
  let d = Math.abs(r * 180 / Math.PI);
  return d > 180 ? 360 - d : d;
}

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function mid(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, score: Math.min(a.score, b.score) };
}

function ok(p, t = 0.4) { return p && p.score > t; }

function smooth(val, key) {
  if (!angleBuffers[key]) angleBuffers[key] = [];
  angleBuffers[key].push(val);
  if (angleBuffers[key].length > SMOOTH_SIZE) angleBuffers[key].shift();
  const sorted = [...angleBuffers[key]].sort((a, b) => a - b);
  return sorted[Math.floor(sorted.length / 2)];
}

function bestSide(kps, lIds, rIds) {
  const [lA, lB, lC] = lIds.map(i => kps[i]);
  const [rA, rB, rC] = rIds.map(i => kps[i]);
  const lOk = ok(lA) && ok(lB) && ok(lC);
  const rOk = ok(rA) && ok(rB) && ok(rC);
  if (lOk && rOk) {
    return Math.min(lA.score, lB.score, lC.score) >= Math.min(rA.score, rB.score, rC.score)
      ? angle(lA, lB, lC) : angle(rA, rB, rC);
  }
  if (lOk) return angle(lA, lB, lC);
  if (rOk) return angle(rA, rB, rC);
  return null;
}

function getBestMid(kps, li, ri) {
  const l = kps[li], r = kps[ri];
  if (ok(l) && ok(r)) return mid(l, r);
  if (ok(l)) return l;
  if (ok(r)) return r;
  return null;
}

function result(phase, feedback, rawAngle) {
  return { phase, feedback, rawAngle, minAngle: 40, maxAngle: 180 };
}

// ==================== EXERCISE DETECTION ====================
function detectExercise(kps) {
  const fn = { pushups: detectPushups, squats: detectSquats, crunches: detectCrunches, jumpingjacks: detectJJ };
  return (fn[currentExercise] || detectPushups)(kps);
}

function detectPushups(kps) {
  const raw = bestSide(kps, [L_SHOULDER, L_ELBOW, L_WRIST], [R_SHOULDER, R_ELBOW, R_WRIST]);
  if (raw === null) return result(null, 'Ustaw się bokiem – ramiona muszą być widoczne', 0);
  const a = smooth(raw, 'pu');
  if (a < 85)  return result('down', `Dół ✓ (${a.toFixed(0)}°)`, a);
  if (a > 155) return result('up',   `Góra ✓ (${a.toFixed(0)}°)`, a);
  return result(null, `Ruch... ${a.toFixed(0)}°`, a);
}

function detectSquats(kps) {
  const raw = bestSide(kps, [L_HIP, L_KNEE, L_ANKLE], [R_HIP, R_KNEE, R_ANKLE]);
  if (raw === null) return result(null, 'Ustaw się bokiem – nogi muszą być widoczne', 0);
  const a = smooth(raw, 'sq');
  if (a < 95)  return result('down', `Dół ✓ (${a.toFixed(0)}°)`, a);
  if (a > 165) return result('up',   `Góra ✓ (${a.toFixed(0)}°)`, a);
  return result(null, `Ruch... ${a.toFixed(0)}°`, a);
}

function detectCrunches(kps) {
  const shoulder = getBestMid(kps, L_SHOULDER, R_SHOULDER);
  const hip = getBestMid(kps, L_HIP, R_HIP);
  const knee = getBestMid(kps, L_KNEE, R_KNEE);
  if (!shoulder || !hip || !knee) return result(null, 'Połóż się bokiem do kamery, kolana zgięte', 0);
  const raw = angle(shoulder, hip, knee);
  const a = smooth(raw, 'cr');
  if (a < 60)  return result('up',   `Góra ✓ (${a.toFixed(0)}°)`, a);
  if (a > 130) return result('down', `Dół ✓ (${a.toFixed(0)}°)`, a);
  return result(null, `Ruch... ${a.toFixed(0)}°`, a);
}

function detectJJ(kps) {
  const lS = kps[L_SHOULDER], rS = kps[R_SHOULDER];
  const lW = kps[L_WRIST], rW = kps[R_WRIST];
  const lH = kps[L_HIP], rH = kps[R_HIP];
  const lA = kps[L_ANKLE], rA = kps[R_ANKLE];

  if (!ok(lS) || !ok(rS) || !ok(lW) || !ok(rW))
    return result(null, 'Stań przodem – cała postać w kadrze', 0);

  const lArm = ok(lH) ? angle(lH, lS, lW) : null;
  const rArm = ok(rH) ? angle(rH, rS, rW) : null;
  const avgArm = (lArm !== null && rArm !== null) ? (lArm + rArm) / 2 : (lArm || rArm || 0);
  const sArm = smooth(avgArm, 'jja');

  const sw = dist(lS, rS);
  let legR = 0;
  if (ok(lA) && ok(rA)) legR = dist(lA, rA) / sw;
  const sLeg = smooth(legR, 'jjl');

  if (sArm > 135 && sLeg > 1.4)  return result('up',   'Rozłóż ✓', sArm);
  if (sArm < 45  && sLeg < 0.85) return result('down', 'Zamknij ✓', sArm);
  return result(null, `Ramiona: ${sArm.toFixed(0)}° Nogi: ${sLeg.toFixed(1)}x`, sArm);
}

// ==================== REP COUNTING ====================
function processRepState(phase) {
  if (!isCounting) return false;
  if (phase === null) {
    consecutiveNullFrames++;
    if (consecutiveNullFrames > 15) stateHoldFrames = 0;
    return false;
  }
  consecutiveNullFrames = 0;
  if (phase === exerciseState) { stateHoldFrames = 0; return false; }

  stateHoldFrames++;
  if (stateHoldFrames < DEBOUNCE_FRAMES) return false;

  const now = Date.now();
  if (now - lastRepTime < REP_COOLDOWN_MS) { stateHoldFrames = 0; return false; }

  stateHoldFrames = 0;
  const prev = exerciseState;
  exerciseState = phase;
  if (prev === 'idle') return false;

  const countTransition = currentExercise === 'crunches'
    ? (prev === 'up' && phase === 'down')
    : (prev === 'down' && phase === 'up');

  if (countTransition) { lastRepTime = now; return true; }
  return false;
}

// ==================== COUNTDOWN ====================
function startCountdown() {
  return new Promise((resolve) => {
    const overlay = document.getElementById('countdownOverlay');
    const numEl = document.getElementById('countdownNumber');
    const labelEl = document.getElementById('countdownLabel');
    overlay.classList.remove('hidden');

    const tips = {
      pushups: 'Ustaw się bokiem w pozycji do pompek',
      squats: 'Stań bokiem, stopy na szerokość barków',
      crunches: 'Połóż się bokiem, kolana zgięte',
      jumpingjacks: 'Stań przodem, cała sylwetka widoczna',
    };
    labelEl.textContent = tips[currentExercise];

    let count = 3;
    numEl.textContent = count;
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        numEl.textContent = count;
      } else {
        numEl.textContent = 'GO!';
        labelEl.textContent = 'Zaczynaj!';
        clearInterval(iv);
        setTimeout(() => { overlay.classList.add('hidden'); resolve(); }, 600);
      }
    }, 1000);
  });
}

// ==================== DRAWING ====================
function drawSkeleton(keypoints) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const color = isCounting ? '200,255,0' : '100,100,120';

  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (const [i, j] of SKELETON) {
    const a = keypoints[i], b = keypoints[j];
    if (a.score > 0.3 && b.score > 0.3) {
      ctx.strokeStyle = `rgba(${color},${Math.min(a.score, b.score)})`;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
  }
  for (const p of keypoints) {
    if (p.score > 0.3) {
      ctx.fillStyle = `rgba(${color},${p.score})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// ==================== MAIN LOOP ====================
async function detectFrame() {
  if (!isRunning || !detector) return;
  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal: false });
    if (poses.length > 0) {
      const kps = poses[0].keypoints;
      const sx = canvas.width / video.videoWidth;
      const sy = canvas.height / video.videoHeight;
      const scaled = kps.map(k => ({ ...k, x: k.x * sx, y: k.y * sy }));
      drawSkeleton(scaled);

      const r = detectExercise(kps);
      if (processRepState(r.phase)) {
        reps[currentExercise]++;
        updateUI();
        flashRep();
      }
      updatePhaseBar(r);
      updateFeedback(r.feedback, r.phase !== null && isCounting);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updateFeedback('Nie wykryto osoby – ustaw się w kadrze', false);
      updatePhaseBar(null);
    }
  } catch (e) { console.error(e); }
  animFrameId = requestAnimationFrame(detectFrame);
}

// ==================== UI ====================
function updateUI() {
  for (const ex of Object.keys(reps)) document.getElementById(`reps-${ex}`).textContent = reps[ex];
  document.getElementById('totalReps').textContent = reps[currentExercise];
  if (startTime && reps[currentExercise] > 0) {
    const min = (Date.now() - startTime) / 60000;
    document.getElementById('pace').textContent = Math.round(reps[currentExercise] / min);
  }
}

function updatePhaseBar(r) {
  const fill = document.getElementById('phaseFill');
  const val = document.getElementById('phaseValue');
  const lbl = document.getElementById('phaseLabel');
  if (!r || !r.rawAngle) { fill.style.width = '0%'; val.textContent = '–'; return; }
  const pct = Math.max(0, Math.min(100, ((r.rawAngle - r.minAngle) / (r.maxAngle - r.minAngle)) * 100));
  fill.style.width = pct + '%';
  val.textContent = r.rawAngle.toFixed(0) + '°';
  const labels = { pushups: 'Łokieć', squats: 'Kolano', crunches: 'Tułów', jumpingjacks: 'Ramiona' };
  lbl.textContent = labels[currentExercise];
  fill.style.background = r.phase === 'down' ? 'var(--orange)' : r.phase === 'up' ? 'var(--accent)' : 'var(--text-dim)';
}

function flashRep() {
  const el = document.getElementById('repDisplay');
  el.textContent = reps[currentExercise];
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 800);
}

function updateFeedback(text, isGood) {
  const bar = document.getElementById('feedback');
  const txt = document.getElementById('feedbackText');
  const icon = bar.querySelector('.fb-icon');
  txt.textContent = text;
  const warn = text.includes('Nie wykryto');
  bar.className = 'feedback-bar' + (isGood ? ' good' : warn ? ' warn' : '');
  icon.textContent = isGood ? '✅' : warn ? '⚠️' : 'ℹ️';
}

function updateTimer() {
  if (!startTime) return;
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timer').textContent =
    String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function selectExercise(exercise, btn) {
  currentExercise = exercise;
  exerciseState = 'idle';
  stateHoldFrames = 0;
  angleBuffers = {};
  consecutiveNullFrames = 0;
  document.querySelectorAll('.exercise-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('totalReps').textContent = reps[exercise];

  const tips = {
    pushups: 'Pompki: ustaw się bokiem w pozycji do pompek.',
    squats: 'Przysiady: stań bokiem, stopy na szerokość barków.',
    crunches: 'Brzuszki: połóż się bokiem, kolana zgięte.',
    jumpingjacks: 'Pajacyki: stań przodem, cała postać widoczna.',
  };
  updateFeedback(tips[exercise], false);

  if (isRunning) {
    isCounting = false;
    exerciseState = 'idle';
    startCountdown().then(() => { isCounting = true; });
  }
}

// ==================== CAMERA & MODEL ====================
async function toggleCamera() {
  if (isRunning) { stopCamera(); return; }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Ładowanie...';

  try {
    video = document.getElementById('video');
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');

    // *** FRONT CAMERA FIRST, fallback to rear ***
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
    } catch (e) {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
      });
    }
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    document.getElementById('placeholder').classList.add('hidden');

    document.getElementById('loadingContainer').style.display = 'block';
    document.getElementById('loadingText').style.display = 'block';
    document.getElementById('loadingBar').style.width = '20%';
    document.getElementById('loadingText').textContent = 'Inicjalizacja AI...';

    try { await tf.setBackend('webgl'); await tf.ready(); }
    catch (e) {
      try { await tf.setBackend('wasm'); await tf.ready(); }
      catch (e2) { await tf.setBackend('cpu'); await tf.ready(); }
    }

    document.getElementById('loadingBar').style.width = '50%';
    document.getElementById('loadingText').textContent = 'Ładowanie MoveNet...';

    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
    );

    document.getElementById('loadingBar').style.width = '90%';
    document.getElementById('loadingText').textContent = 'Rozgrzewka modelu...';
    for (let i = 0; i < 5; i++) await detector.estimatePoses(video, { flipHorizontal: false });

    document.getElementById('loadingBar').style.width = '100%';
    setTimeout(() => {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('loadingText').style.display = 'none';
    }, 300);

    isRunning = true;
    isCounting = false;
    exerciseState = 'idle';
    angleBuffers = {};
    stateHoldFrames = 0;
    consecutiveNullFrames = 0;

    btn.textContent = 'Zatrzymaj';
    btn.disabled = false;
    document.getElementById('statusBadge').textContent = 'AKTYWNY';
    document.getElementById('statusBadge').style.background = 'rgba(200,255,0,0.15)';
    document.getElementById('statusBadge').style.color = 'var(--accent)';

    detectFrame();

    await startCountdown();
    isCounting = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);

  } catch (err) {
    console.error(err);
    btn.disabled = false;
    btn.textContent = 'Rozpocznij';
    let msg = 'Nie udało się uruchomić kamery.';
    if (err.name === 'NotAllowedError') msg = 'Brak dostępu do kamery – zezwól w ustawieniach.';
    else if (err.name === 'NotFoundError') msg = 'Nie znaleziono kamery.';
    updateFeedback(msg, false);
  }
}

function stopCamera() {
  isRunning = false;
  isCounting = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (timerInterval) clearInterval(timerInterval);
  const v = document.getElementById('video');
  if (v?.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
  if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('countdownOverlay').classList.add('hidden');
  document.getElementById('startBtn').textContent = 'Rozpocznij';
  document.getElementById('statusBadge').textContent = 'PAUZA';
  document.getElementById('statusBadge').style.background = 'rgba(255,138,0,0.15)';
  document.getElementById('statusBadge').style.color = 'var(--orange)';
}

function resetAll() {
  stopCamera();
  reps = { pushups: 0, squats: 0, crunches: 0, jumpingjacks: 0 };
  startTime = null;
  exerciseState = 'idle';
  angleBuffers = {};
  stateHoldFrames = 0;
  consecutiveNullFrames = 0;
  updateUI();
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('pace').textContent = '–';
  document.getElementById('phaseFill').style.width = '0%';
  document.getElementById('phaseValue').textContent = '–';
  document.getElementById('placeholder').classList.remove('hidden');
  document.getElementById('statusBadge').textContent = 'OCZEKIWANIE';
  document.getElementById('statusBadge').style.background = 'var(--accent-dim)';
  document.getElementById('statusBadge').style.color = 'var(--accent)';
  updateFeedback('Wybierz ćwiczenie i włącz kamerę, aby zacząć trening.', false);
}
</script>
