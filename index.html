<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Exercise Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08080a;
    --surface: #111114;
    --surface2: #1a1a1f;
    --border: #2a2a30;
    --text: #e8e8ec;
    --text-dim: #6e6e78;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.15);
    --red: #ff3b5c;
    --blue: #3b82f6;
    --orange: #ff8a00;
    --purple: #a855f7;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(200,255,0,0); }
  }
  .status-badge {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(200,255,0,0.2);
  }

  /* MAIN LAYOUT */
  .app-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* CAMERA VIEW */
  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .camera-wrapper video,
  .camera-wrapper canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .camera-wrapper video { transform: scaleX(-1); }
  .camera-wrapper canvas { transform: scaleX(-1); z-index: 2; }

  .camera-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }
  .overlay-corner {
    position: absolute;
    width: 32px; height: 32px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
  }
  .overlay-corner.tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
  .overlay-corner.tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
  .overlay-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
  .overlay-corner.br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

  .rep-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 120px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(200,255,0,0.3);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .rep-display.show {
    opacity: 1;
    animation: rep-pop 0.4s ease;
  }
  @keyframes rep-pop {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .camera-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 4;
    background: var(--surface);
  }
  .camera-placeholder.hidden { display: none; }
  .camera-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .camera-placeholder p {
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
  }

  /* LOADING */
  .loading-bar-container {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 4px;
    background: var(--surface2);
    z-index: 10;
  }
  .loading-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 0 2px 2px 0;
  }
  .loading-text {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    z-index: 10;
    background: rgba(8,8,10,0.8);
    padding: 4px 12px;
    border-radius: 8px;
  }

  /* EXERCISE SELECTOR */
  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .exercise-btn {
    position: relative;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .exercise-btn:hover {
    border-color: var(--text-dim);
    background: var(--surface2);
  }
  .exercise-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .exercise-btn .ex-icon {
    font-size: 24px;
    line-height: 1;
  }
  .exercise-btn .ex-reps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
  }

  /* STATS PANEL */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }
  .stat-value.accent { color: var(--accent); }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--text-dim); }

  /* FEEDBACK BAR */
  .feedback-bar {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 48px;
  }
  .feedback-bar .fb-icon {
    font-size: 18px;
    flex-shrink: 0;
  }
  .feedback-bar.good { color: var(--accent); border-color: rgba(200,255,0,0.2); }
  .feedback-bar.warn { color: var(--orange); border-color: rgba(255,138,0,0.2); }

  /* ANGLE DEBUG */
  .angle-debug {
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    padding: 0 4px;
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .camera-wrapper { aspect-ratio: 3/4; }
    .exercise-btn { padding: 10px 4px; font-size: 10px; }
    .exercise-btn .ex-icon { font-size: 20px; }
    .exercise-btn .ex-reps { font-size: 16px; }
    .rep-display { font-size: 80px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    MOTION·AI
  </div>
  <div class="status-badge" id="statusBadge">OCZEKIWANIE</div>
</div>

<div class="app-container">
  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="camera-overlay">
      <div class="overlay-corner tl"></div>
      <div class="overlay-corner tr"></div>
      <div class="overlay-corner bl"></div>
      <div class="overlay-corner br"></div>
    </div>
    <div class="rep-display" id="repDisplay">0</div>
    <div class="camera-placeholder" id="placeholder">
      <div class="camera-icon">📷</div>
      <p>Włącz kamerę, aby rozpocząć<br>detekcję ćwiczeń</p>
    </div>
    <div class="loading-bar-container" id="loadingContainer" style="display:none">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText" style="display:none">Ładowanie modelu AI...</div>
  </div>

  <div class="exercise-grid">
    <button class="exercise-btn active" data-exercise="pushups" onclick="selectExercise('pushups', this)">
      <span class="ex-icon">💪</span>
      <span>Pompki</span>
      <span class="ex-reps" id="reps-pushups">0</span>
    </button>
    <button class="exercise-btn" data-exercise="squats" onclick="selectExercise('squats', this)">
      <span class="ex-icon">🦵</span>
      <span>Przysiady</span>
      <span class="ex-reps" id="reps-squats">0</span>
    </button>
    <button class="exercise-btn" data-exercise="crunches" onclick="selectExercise('crunches', this)">
      <span class="ex-icon">🔥</span>
      <span>Brzuszki</span>
      <span class="ex-reps" id="reps-crunches">0</span>
    </button>
    <button class="exercise-btn" data-exercise="jumpingjacks" onclick="selectExercise('jumpingjacks', this)">
      <span class="ex-icon">⭐</span>
      <span>Pajacyki</span>
      <span class="ex-reps" id="reps-jumpingjacks">0</span>
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Powtórzenia</div>
      <div class="stat-value accent" id="totalReps">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Czas</div>
      <div class="stat-value" id="timer">00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tempo /min</div>
      <div class="stat-value" id="pace">–</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="toggleCamera()">Rozpocznij</button>
    <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
  </div>

  <div class="feedback-bar" id="feedback">
    <span class="fb-icon">ℹ️</span>
    <span id="feedbackText">Wybierz ćwiczenie i włącz kamerę, aby zacząć trening.</span>
  </div>

  <div class="angle-debug" id="angleDebug"></div>
</div>

<script>
// ==================== STATE ====================
let currentExercise = 'pushups';
let reps = { pushups: 0, squats: 0, crunches: 0, jumpingjacks: 0 };
let isRunning = false;
let detector = null;
let video, canvas, ctx;
let timerInterval = null;
let startTime = null;
let animFrameId = null;

// Exercise state machine
let exerciseState = 'idle'; // 'idle', 'down', 'up'
let stateHoldFrames = 0;
const DEBOUNCE_FRAMES = 3;

// ==================== KEYPOINT INDICES ====================
const NOSE = 0;
const L_SHOULDER = 5, R_SHOULDER = 6;
const L_ELBOW = 7, R_ELBOW = 8;
const L_WRIST = 9, R_WRIST = 10;
const L_HIP = 11, R_HIP = 12;
const L_KNEE = 13, R_KNEE = 14;
const L_ANKLE = 15, R_ANKLE = 16;

// Skeleton connections for drawing
const SKELETON_CONNECTIONS = [
  [L_SHOULDER, R_SHOULDER],
  [L_SHOULDER, L_ELBOW], [L_ELBOW, L_WRIST],
  [R_SHOULDER, R_ELBOW], [R_ELBOW, R_WRIST],
  [L_SHOULDER, L_HIP], [R_SHOULDER, R_HIP],
  [L_HIP, R_HIP],
  [L_HIP, L_KNEE], [L_KNEE, L_ANKLE],
  [R_HIP, R_KNEE], [R_KNEE, R_ANKLE],
];

// ==================== UTILITY ====================
function angle(a, b, c) {
  const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
  let deg = Math.abs(radians * 180 / Math.PI);
  if (deg > 180) deg = 360 - deg;
  return deg;
}

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function mid(a, b) {
  return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, score: Math.min(a.score, b.score) };
}

function kp(keypoints, idx) {
  return keypoints[idx];
}

function confident(point, threshold = 0.3) {
  return point && point.score > threshold;
}

// ==================== EXERCISE DETECTION ====================
function detectExercise(keypoints) {
  switch (currentExercise) {
    case 'pushups': return detectPushups(keypoints);
    case 'squats': return detectSquats(keypoints);
    case 'crunches': return detectCrunches(keypoints);
    case 'jumpingjacks': return detectJumpingJacks(keypoints);
  }
  return { phase: null, feedback: '' };
}

function detectPushups(kps) {
  const lShoulder = kp(kps, L_SHOULDER);
  const rShoulder = kp(kps, R_SHOULDER);
  const lElbow = kp(kps, L_ELBOW);
  const rElbow = kp(kps, R_ELBOW);
  const lWrist = kp(kps, L_WRIST);
  const rWrist = kp(kps, R_WRIST);
  const lHip = kp(kps, L_HIP);
  const rHip = kp(kps, R_HIP);

  // Use the side with better visibility
  let elbowAngle = null;
  let debugInfo = '';

  if (confident(lShoulder) && confident(lElbow) && confident(lWrist)) {
    elbowAngle = angle(lShoulder, lElbow, lWrist);
  }
  if (confident(rShoulder) && confident(rElbow) && confident(rWrist)) {
    const rAngle = angle(rShoulder, rElbow, rWrist);
    if (elbowAngle === null || rShoulder.score > lShoulder.score) elbowAngle = rAngle;
  }

  if (elbowAngle === null) {
    return { phase: null, feedback: 'Ustaw się bokiem do kamery, aby wykryć pozycję ramion', debug: '' };
  }

  debugInfo = `Łokieć: ${elbowAngle.toFixed(0)}°`;

  if (elbowAngle < 100) {
    return { phase: 'down', feedback: 'Dół – teraz wypchnij się w górę!', debug: debugInfo };
  } else if (elbowAngle > 150) {
    return { phase: 'up', feedback: 'Góra – świetna pozycja!', debug: debugInfo };
  }
  return { phase: null, feedback: 'Kontynuuj ruch...', debug: debugInfo };
}

function detectSquats(kps) {
  const lHip = kp(kps, L_HIP);
  const rHip = kp(kps, R_HIP);
  const lKnee = kp(kps, L_KNEE);
  const rKnee = kp(kps, R_KNEE);
  const lAnkle = kp(kps, L_ANKLE);
  const rAnkle = kp(kps, R_ANKLE);

  let kneeAngle = null;
  let debugInfo = '';

  if (confident(lHip) && confident(lKnee) && confident(lAnkle)) {
    kneeAngle = angle(lHip, lKnee, lAnkle);
  }
  if (confident(rHip) && confident(rKnee) && confident(rAnkle)) {
    const rAngle = angle(rHip, rKnee, rAnkle);
    if (kneeAngle === null || rHip.score > lHip.score) kneeAngle = rAngle;
  }

  if (kneeAngle === null) {
    return { phase: null, feedback: 'Ustaw się bokiem do kamery, stań prosto', debug: '' };
  }

  debugInfo = `Kolano: ${kneeAngle.toFixed(0)}°`;

  if (kneeAngle < 110) {
    return { phase: 'down', feedback: 'Dół – uda równolegle do podłogi!', debug: debugInfo };
  } else if (kneeAngle > 160) {
    return { phase: 'up', feedback: 'Góra – stój prosto!', debug: debugInfo };
  }
  return { phase: null, feedback: 'Kontynuuj ruch...', debug: debugInfo };
}

function detectCrunches(kps) {
  const lShoulder = kp(kps, L_SHOULDER);
  const rShoulder = kp(kps, R_SHOULDER);
  const lHip = kp(kps, L_HIP);
  const rHip = kp(kps, R_HIP);
  const lKnee = kp(kps, L_KNEE);
  const rKnee = kp(kps, R_KNEE);

  let torsoAngle = null;
  let debugInfo = '';

  // Use mid-points for better accuracy
  const shoulder = (confident(lShoulder) && confident(rShoulder)) ? mid(lShoulder, rShoulder) :
    confident(lShoulder) ? lShoulder : confident(rShoulder) ? rShoulder : null;
  const hip = (confident(lHip) && confident(rHip)) ? mid(lHip, rHip) :
    confident(lHip) ? lHip : confident(rHip) ? rHip : null;
  const knee = (confident(lKnee) && confident(rKnee)) ? mid(lKnee, rKnee) :
    confident(lKnee) ? lKnee : confident(rKnee) ? rKnee : null;

  if (shoulder && hip && knee) {
    torsoAngle = angle(shoulder, hip, knee);
  }

  if (torsoAngle === null) {
    return { phase: null, feedback: 'Połóż się na plecach, kolana zgięte, kamera z boku', debug: '' };
  }

  debugInfo = `Tułów: ${torsoAngle.toFixed(0)}°`;

  if (torsoAngle < 75) {
    return { phase: 'up', feedback: 'Góra – napnij brzuch!', debug: debugInfo };
  } else if (torsoAngle > 120) {
    return { phase: 'down', feedback: 'Dół – kontroluj ruch', debug: debugInfo };
  }
  return { phase: null, feedback: 'Kontynuuj ruch...', debug: debugInfo };
}

function detectJumpingJacks(kps) {
  const lShoulder = kp(kps, L_SHOULDER);
  const rShoulder = kp(kps, R_SHOULDER);
  const lWrist = kp(kps, L_WRIST);
  const rWrist = kp(kps, R_WRIST);
  const lHip = kp(kps, L_HIP);
  const rHip = kp(kps, R_HIP);
  const lAnkle = kp(kps, L_ANKLE);
  const rAnkle = kp(kps, R_ANKLE);

  if (!confident(lShoulder) || !confident(rShoulder) || !confident(lWrist) || !confident(rWrist)) {
    return { phase: null, feedback: 'Stań przodem do kamery, cała postać widoczna', debug: '' };
  }

  // Arm angles: shoulder-hip line vs shoulder-wrist
  const lArmAngle = confident(lHip) ? angle(lHip, lShoulder, lWrist) : null;
  const rArmAngle = confident(rHip) ? angle(rHip, rShoulder, rWrist) : null;

  // Leg spread: distance between ankles relative to shoulder width
  const shoulderWidth = dist(lShoulder, rShoulder);
  let legSpread = 0;
  if (confident(lAnkle) && confident(rAnkle)) {
    legSpread = dist(lAnkle, rAnkle) / shoulderWidth;
  }

  const avgArmAngle = (lArmAngle !== null && rArmAngle !== null)
    ? (lArmAngle + rArmAngle) / 2
    : (lArmAngle || rArmAngle || 0);

  const handsUp = avgArmAngle > 120;
  const handsDown = avgArmAngle < 60;

  const debugInfo = `Ramiona: ${avgArmAngle?.toFixed(0)}° | Nogi: ${legSpread.toFixed(1)}x`;

  if (handsUp && legSpread > 1.2) {
    return { phase: 'up', feedback: 'Rozłóż! Ręce w górze!', debug: debugInfo };
  } else if (handsDown && legSpread < 1.0) {
    return { phase: 'down', feedback: 'Zamknij! Ręce przy ciele!', debug: debugInfo };
  }
  return { phase: null, feedback: 'Kontynuuj ruch...', debug: debugInfo };
}

// ==================== REP COUNTING STATE MACHINE ====================
function processRepState(phase) {
  if (phase === null) {
    stateHoldFrames = 0;
    return false;
  }

  if (phase === exerciseState) {
    stateHoldFrames = 0;
    return false;
  }

  stateHoldFrames++;
  if (stateHoldFrames < DEBOUNCE_FRAMES) return false;

  stateHoldFrames = 0;
  const prevState = exerciseState;
  exerciseState = phase;

  // Count a rep on the transition from down→up (or for crunches: up is the contraction)
  if (currentExercise === 'crunches') {
    if (prevState === 'up' && phase === 'down') return true;
  } else {
    if (prevState === 'down' && phase === 'up') return true;
  }
  return false;
}

// ==================== DRAWING ====================
function drawSkeleton(keypoints) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw connections
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  for (const [i, j] of SKELETON_CONNECTIONS) {
    const a = keypoints[i];
    const b = keypoints[j];
    if (a.score > 0.3 && b.score > 0.3) {
      ctx.strokeStyle = `rgba(200, 255, 0, ${Math.min(a.score, b.score)})`;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }

  // Draw keypoints
  for (const point of keypoints) {
    if (point.score > 0.3) {
      ctx.fillStyle = `rgba(200, 255, 0, ${point.score})`;
      ctx.beginPath();
      ctx.arc(point.x, point.y, 5, 0, 2 * Math.PI);
      ctx.fill();

      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(point.x, point.y, 2, 0, 2 * Math.PI);
      ctx.fill();
    }
  }
}

// ==================== MAIN LOOP ====================
async function detectFrame() {
  if (!isRunning || !detector) return;

  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal: false });

    if (poses.length > 0) {
      const keypoints = poses[0].keypoints;

      // Scale keypoints to canvas
      const scaleX = canvas.width / video.videoWidth;
      const scaleY = canvas.height / video.videoHeight;
      const scaled = keypoints.map(kp => ({
        ...kp,
        x: kp.x * scaleX,
        y: kp.y * scaleY
      }));

      drawSkeleton(scaled);

      // Detect exercise
      const result = detectExercise(keypoints);
      const counted = processRepState(result.phase);

      if (counted) {
        reps[currentExercise]++;
        updateUI();
        flashRep();
      }

      updateFeedback(result.feedback, result.phase !== null);
      document.getElementById('angleDebug').textContent = result.debug || '';
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updateFeedback('Nie wykryto osoby – ustaw się w kadrze', false);
    }
  } catch (e) {
    console.error('Detection error:', e);
  }

  animFrameId = requestAnimationFrame(detectFrame);
}

// ==================== UI UPDATES ====================
function updateUI() {
  for (const ex of Object.keys(reps)) {
    document.getElementById(`reps-${ex}`).textContent = reps[ex];
  }
  document.getElementById('totalReps').textContent = reps[currentExercise];

  // Pace calculation
  if (startTime && reps[currentExercise] > 0) {
    const elapsed = (Date.now() - startTime) / 1000 / 60;
    const pace = Math.round(reps[currentExercise] / elapsed);
    document.getElementById('pace').textContent = pace;
  }
}

function flashRep() {
  const el = document.getElementById('repDisplay');
  el.textContent = reps[currentExercise];
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 600);
}

function updateFeedback(text, isGood) {
  const bar = document.getElementById('feedback');
  const icon = bar.querySelector('.fb-icon');
  const txt = document.getElementById('feedbackText');
  txt.textContent = text;
  bar.className = 'feedback-bar' + (isGood ? ' good' : text.includes('Nie wykryto') ? ' warn' : '');
  icon.textContent = isGood ? '✅' : text.includes('Nie wykryto') ? '⚠️' : 'ℹ️';
}

function updateTimer() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const sec = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${min}:${sec}`;
}

function selectExercise(exercise, btn) {
  currentExercise = exercise;
  exerciseState = 'idle';
  stateHoldFrames = 0;

  document.querySelectorAll('.exercise-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('totalReps').textContent = reps[exercise];
  document.getElementById('angleDebug').textContent = '';

  const names = { pushups: 'Pompki', squats: 'Przysiady', crunches: 'Brzuszki', jumpingjacks: 'Pajacyki' };
  const tips = {
    pushups: 'Ustaw się bokiem do kamery w pozycji do pompek.',
    squats: 'Stań bokiem do kamery, stopy na szerokość barków.',
    crunches: 'Połóż się na plecach bokiem do kamery, kolana zgięte.',
    jumpingjacks: 'Stań przodem do kamery, cała postać w kadrze.',
  };
  updateFeedback(`${names[exercise]}: ${tips[exercise]}`, false);
}

// ==================== CAMERA & MODEL ====================
async function toggleCamera() {
  if (isRunning) {
    stopCamera();
    return;
  }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Ładowanie...';

  try {
    video = document.getElementById('video');
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');

    // Start camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    await video.play();

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    document.getElementById('placeholder').classList.add('hidden');

    // Load model
    document.getElementById('loadingContainer').style.display = 'block';
    document.getElementById('loadingText').style.display = 'block';
    document.getElementById('loadingBar').style.width = '30%';

    await tf.ready();
    document.getElementById('loadingBar').style.width = '60%';
    document.getElementById('loadingText').textContent = 'Ładowanie MoveNet...';

    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {
        modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
      }
    );

    document.getElementById('loadingBar').style.width = '100%';
    setTimeout(() => {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('loadingText').style.display = 'none';
    }, 500);

    // Start detection
    isRunning = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    exerciseState = 'idle';

    btn.textContent = 'Zatrzymaj';
    btn.disabled = false;
    document.getElementById('statusBadge').textContent = 'AKTYWNY';
    document.getElementById('statusBadge').style.background = 'rgba(200,255,0,0.15)';
    document.getElementById('statusBadge').style.color = 'var(--accent)';

    detectFrame();

  } catch (err) {
    console.error(err);
    btn.disabled = false;
    btn.textContent = 'Rozpocznij';
    let msg = 'Nie udało się uruchomić kamery.';
    if (err.name === 'NotAllowedError') msg = 'Brak dostępu do kamery – zezwól w ustawieniach przeglądarki.';
    if (err.message?.includes('tf') || err.message?.includes('model')) msg = 'Nie udało się załadować modelu AI. Sprawdź połączenie z internetem.';
    updateFeedback(msg, false);
  }
}

function stopCamera() {
  isRunning = false;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (timerInterval) clearInterval(timerInterval);

  const video = document.getElementById('video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  ctx && ctx.clearRect(0, 0, canvas.width, canvas.height);

  document.getElementById('startBtn').textContent = 'Rozpocznij';
  document.getElementById('statusBadge').textContent = 'PAUZA';
  document.getElementById('statusBadge').style.background = 'rgba(255,138,0,0.15)';
  document.getElementById('statusBadge').style.color = 'var(--orange)';
}

function resetAll() {
  stopCamera();
  reps = { pushups: 0, squats: 0, crunches: 0, jumpingjacks: 0 };
  startTime = null;
  exerciseState = 'idle';
  updateUI();
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('pace').textContent = '–';
  document.getElementById('placeholder').classList.remove('hidden');
  document.getElementById('statusBadge').textContent = 'OCZEKIWANIE';
  document.getElementById('statusBadge').style.background = 'var(--accent-dim)';
  document.getElementById('statusBadge').style.color = 'var(--accent)';
  updateFeedback('Wybierz ćwiczenie i włącz kamerę, aby zacząć trening.', false);
  document.getElementById('angleDebug').textContent = '';
}
</script>
